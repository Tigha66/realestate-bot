<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate AI Agent 🏠</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* Header */
    header {
      text-align: center;
      padding: 40px 0;
    }
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    header p { color: #888; font-size: 1.1rem; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .tab {
      padding: 12px 24px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .tab:hover { background: rgba(255,255,255,0.2); }
    .tab.active { background: #4f46e5; }
    
    /* Sections */
    .section { display: none; }
    .section.active { display: block; }
    
    /* Cards */
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    /* Forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; color: #aaa; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
    }
    button.btn {
      padding: 12px 24px;
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }
    button.btn:hover { background: #4338ca; transform: translateY(-2px); }
    
    /* Properties Grid */
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .property-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }
    .property-image {
      height: 200px;
      background: linear-gradient(45deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .property-info { padding: 16px; }
    .property-price { font-size: 1.5rem; color: #4f46e5; font-weight: bold; }
    .property-address { color: #aaa; margin: 8px 0; }
    .property-details { display: flex; gap: 15px; color: #888; font-size: 0.9rem; }
    
    /* Chat */
    .chat-container {
      height: 500px;
      display: flex;
      flex-direction: column;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .message { margin-bottom: 12px; padding: 12px 16px; border-radius: 12px; max-width: 80%; }
    .message.bot { background: #4f46e5; margin-right: auto; }
    .message.user { background: rgba(255,255,255,0.2); margin-left: auto; }
    .chat-input { display: flex; gap: 10px; }
    .chat-input input { flex: 1; }
    
    /* Lead Status */
    .lead-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-left: 10px;
    }
    .status-qualified { background: #10b981; }
    .status-qualifying { background: #f59e0b; }
    .status-initial { background: #6b7280; }
    
    /* Tours */
    .tour-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #4f46e5;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      header h1 { font-size: 1.8rem; }
      .properties-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏠 Real Estate AI Agent</h1>
      <p>Find your dream home with AI assistance</p>
    </header>
    
    <div class="tabs">
      <button class="tab active" data-tab="properties">Properties</button>
      <button class="tab" data-tab="chat">AI Assistant</button>
      <button class="tab" data-tab="leads">Leads</button>
      <button class="tab" data-tab="tours">Tours</button>
    </div>
    
    <!-- Properties Section -->
    <div id="properties" class="section active">
      <div class="card">
        <h2>Search Properties</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px;">
          <div class="form-group">
            <label>Min Price</label>
            <input type="number" id="minPrice" placeholder="$300,000">
          </div>
          <div class="form-group">
            <label>Max Price</label>
            <input type="number" id="maxPrice" placeholder="$1,000,000">
          </div>
          <div class="form-group">
            <label>Bedrooms</label>
            <select id="bedrooms">
              <option value="">Any</option>
              <option value="1">1+</option>
              <option value="2">2+</option>
              <option value="3">3+</option>
              <option value="4">4+</option>
            </select>
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" placeholder="Miami, NYC...">
          </div>
        </div>
        <button class="btn" onclick="searchProperties()">Search</button>
      </div>
      
      <div class="properties-grid" id="propertiesList">
        <!-- Properties loaded dynamically -->
      </div>
    </div>
    
    <!-- Chat Section -->
    <div id="chat" class="section">
      <div class="card chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="message bot">Hello! I'm your Real Estate AI Assistant. How can I help you today?</div>
        </div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="handleChatKeypress(event)">
          <button class="btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
    
    <!-- Leads Section -->
    <div id="leads" class="section">
      <div class="card">
        <h2>Add New Lead</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 16px;">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="leadName" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="leadPhone" placeholder="+1234567890">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="leadEmail" placeholder="john@example.com">
          </div>
        </div>
        <button class="btn" onclick="createLead()">Create Lead</button>
      </div>
      
      <div id="leadsList">
        <!-- Leads loaded dynamically -->
      </div>
    </div>
    
    <!-- Tours Section -->
    <div id="tours" class="section">
      <div class="card">
        <h2>Schedule Tour</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 16px;">
          <div class="form-group">
            <label>Lead ID</label>
            <input type="text" id="tourLeadId" placeholder="LEAD-XXXX">
          </div>
          <div class="form-group">
            <label>Property ID</label>
            <input type="text" id="tourPropertyId" placeholder="prop-001">
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="tourDate">
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="tourTime">
          </div>
        </div>
        <button class="btn" onclick="scheduleTour()">Schedule Tour</button>
      </div>
      
      <div id="toursList">
        <!-- Tours loaded dynamically -->
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentLeadId = null;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    // Properties
    async function searchProperties() {
      const minPrice = document.getElementById('minPrice').value;
      const maxPrice = document.getElementById('maxPrice').value;
      const bedrooms = document.getElementById('bedrooms').value;
      const city = document.getElementById('city').value;
      
      let url = `${API_BASE}/api/properties?`;
      if (minPrice) url += `minPrice=${minPrice}&`;
      if (maxPrice) url += `maxPrice=${maxPrice}&`;
      if (bedrooms) url += `bedrooms=${bedrooms}&`;
      if (city) url += `city=${city}&`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        displayProperties(data.properties || []);
      } catch (e) {
        alert('Error loading properties');
      }
    }

    function displayProperties(properties) {
      const container = document.getElementById('propertiesList');
      if (properties.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#888;">No properties found</p>';
        return;
      }
      container.innerHTML = properties.map(p => `
        <div class="property-card">
          <div class="property-image">🏠</div>
          <div class="property-info">
            <div class="property-price">$${p.price.toLocaleString()}</div>
            <div class="property-address">${p.address}, ${p.city}</div>
            <div class="property-details">
              <span>🛏️ ${p.bedrooms} bed</span>
              <span>🚿 ${p.bathrooms} bath</span>
              <span>📐 ${p.sqft.toLocaleString()} sqft</span>
            </div>
            <p style="margin-top:12px;color:#aaa;font-size:0.9rem;">${p.description}</p>
          </div>
        </div>
      `).join('');
    }

    // Chat
    function handleChatKeypress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      addMessage(message, 'user');
      input.value = '';
      
      try {
        const res = await fetch(`${API_BASE}/api/webhook`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({from: 'web-user', message, channel: 'web'})
        });
        const data = await res.json();
        addMessage(data.response, 'bot');
        if (data.leadId && !currentLeadId) {
          currentLeadId = data.leadId;
          addMessage(`Your lead ID: ${currentLeadId}`, 'bot');
        }
      } catch (e) {
        addMessage('Sorry, something went wrong.', 'bot');
      }
    }

    function addMessage(text, sender) {
      const container = document.getElementById('chatMessages');
      container.innerHTML += `<div class="message ${sender}">${text}</div>`;
      container.scrollTop = container.scrollHeight;
    }

    // Leads
    async function createLead() {
      const name = document.getElementById('leadName').value;
      const phone = document.getElementById('leadPhone').value;
      const email = document.getElementById('leadEmail').value;
      
      if (!name || !phone) {
        alert('Name and phone are required');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/api/leads`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, phone, email})
        });
        const data = await res.json();
        alert(`Lead created! ID: ${data.lead.id}`);
        loadLeads();
      } catch (e) {
        alert('Error creating lead');
      }
    }

    async function loadLeads() {
      try {
        const res = await fetch(`${API_BASE}/api/leads`);
        const data = await res.json();
        displayLeads(data.leads || []);
      } catch (e) {
        console.log('Error loading leads');
      }
    }

    function displayLeads(leads) {
      const container = document.getElementById('leadsList');
      if (leads.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#888;">No leads yet</p>';
        return;
      }
      container.innerHTML = leads.map(l => `
        <div class="card">
          <h3>${l.name} <span class="lead-status status-${l.stage}">${l.stage}</span></h3>
          <p style="color:#aaa;margin:8px 0;">📞 ${l.phone} | 📧 ${l.email || 'N/A'}</p>
          <p style="color:#888;font-size:0.9rem;">Score: ${l.score}/100 | Source: ${l.source}</p>
        </div>
      `).join('');
    }

    // Tours
    async function scheduleTour() {
      const leadId = document.getElementById('tourLeadId').value;
      const propertyId = document.getElementById('tourPropertyId').value;
      const date = document.getElementById('tourDate').value;
      const time = document.getElementById('tourTime').value;
      
      if (!leadId || !propertyId || !date || !time) {
        alert('All fields are required');
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/api/tours`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({leadId, propertyId, date, time})
        });
        const data = await res.json();
        alert('Tour scheduled!');
        loadTours();
      } catch (e) {
        alert('Error scheduling tour');
      }
    }

    async function loadTours() {
      // Load leads first to get tour data
      try {
        const res = await fetch(`${API_BASE}/api/leads`);
        const data = await res.json();
        const container = document.getElementById('toursList');
        if (!data.leads || data.leads.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#888;">No tours scheduled</p>';
          return;
        }
        
        // Show tour form info
        container.innerHTML = '<p style="color:#888;text-align:center;">Create a lead first, then schedule a tour using their ID.</p>';
      } catch (e) {
        console.log('Error');
      }
    }

    // Initial load
    searchProperties();
    loadLeads();
  </script>
</body>
</html>
